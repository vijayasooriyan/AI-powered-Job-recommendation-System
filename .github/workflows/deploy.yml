name: Deploy to Production

# When this workflow runs
on:
  push:
    branches:
      - main          # Deploy when code is pushed to main branch
  pull_request:
    branches:
      - main          # Also run tests on pull requests

# Environment variables used by all jobs
env:
  REGISTRY: docker.io

jobs:
  # ============================================
  # JOB 1: TEST - Verify code works
  # ============================================
  test:
    runs-on: ubuntu-latest
    name: Test Code
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Test imports
        run: |
          echo "Testing Streamlit import..."
          python -c "import streamlit; print(f'✓ Streamlit {streamlit.__version__} works')"
          echo "Testing PyMuPDF import..."
          python -c "import pymupdf; print('✓ PyMuPDF works')"
          echo "Testing Groq import..."
          python -c "import groq; print('✓ Groq works')"
          echo "All imports successful!"

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

  # ============================================
  # JOB 2: BUILD - Create Docker image
  # ============================================
  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build Docker Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/job-recommender
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

  # ============================================
  # JOB 3: DEPLOY - Push to Render
  # ============================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Render
        run: |
          curl -X POST https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}
        continue-on-error: true

      - name: Deployment notification
        run: echo "✓ Deployment triggered. Check Render dashboard for status."

  # ============================================
  # JOB 4: NOTIFY - Send status notification
  # ============================================
  notify:
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    name: Notify Result
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine status
        id: status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "status=✅ Deployment Successful" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Deployment Failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Send notification (optional)
        run: |
          echo "Build Status: ${{ steps.status.outputs.status }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Author: ${{ github.actor }}"
